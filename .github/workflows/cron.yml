name: "15-minute Reminders Cron"
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Reminders API
        run: |
          curl -f -X GET "https://crew-gamma.vercel.app/api/cron/reminders" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
